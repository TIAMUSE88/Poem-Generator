<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css">
    <script src="https://cdn.jsdelivr.net/npm/typewriter-effect@2.18.2/dist/core.js"></script>
    <title>AI Poem Generator</title>
</head>

<body>
    <div class="poem-container">
        <header>
            <h1>Welcome to the AI Poem Generator</h1>
        </header>


        <main>
            <form id="poem-generator-form">
                <input type="text" placeholder="Enter a word or phrase to inspire your poem..." autofocus required
                    autocomplete="off" class="prompt" />
                <input type="submit" class="generatebutton" />
            </form>
            <div class="poem" id="poem"> </div>
        </main>

        <footer>This AI Project was coded by Tracey-Marie and open-sourced on <a
                href="https://github.com/TIAMUSE88/Poem-Generator" target="_blank">GITHUB</a>, hosted on <a
                href="https://poem-generator-project26.netlify.app/" target="_blank">Netlify</a>.
        </footer>
        <script src="src/index.js"></script>
    </div>


    <script src="src/index.js"></script>
</body>

</html>
