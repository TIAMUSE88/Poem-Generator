<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css">
    <title>AI Poem Generator</title>
</head>

<body>
    <h1>Welcome to the AI Poem Generator</h1>




    <footer>This AI Project was coded by Tracey-Marie and open-sourced on <a
            href="https://github.com/TIAMUSE88/Poem-Generator" target="_blank">GITHUB</a>, hosted on <a
            href="https://poem-generator-project26.netlify.app/" target="_blank">Netlify</a></footer>
    <script src="src/index.js"></script>
    <header>
        <h1>Welcome to the AI Poem Generator</h1>
    </header>
    <main>
        <section class="input-section">
            <h2>Enter a theme or topic for your poem:</h2>
            <input type="text" id="poem-input" placeholder="e.g., love, nature, friendship">
            <button id="generate-btn">Generate Poem</button>
        </section>
        <section class="output-section">
            <h2>Your AI-Generated Poem:</h2>
            <div id="poem-output"></div>
        </section>

</body>

</html>
